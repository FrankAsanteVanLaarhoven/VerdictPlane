# Gates every PR and push to main on the properties the project claims:
# full test suite, evidence pack regeneration from live runs, benchmark
# targets, and a fresh-environment package install.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable + dev)
        run: make setup

      - name: Test suite (conformance, tamper, gating, zero-egress)
        run: make test

      - name: Evidence pack regenerates from live runs
        run: make evidence

      # Absolute targets (p99 < 1 ms, > 10k/s, tamper 100%, 0 gaps, fail-safe)
      # are enforced as-is. Run-to-run spread is recorded but informational here:
      # on shared runners it measures runner noise, not the system. The +/-10%
      # reproducibility claim is gated locally on dedicated hardware (see
      # docs/EVIDENCE_APPENDIX.md).
      - name: Benchmark absolute targets (spread informational)
        run: |
          PYTHONPATH= VERDICTPLANE_ADVISORY=off .venv/bin/python bench/run_bench.py \
            --runs 3 --n 10000 --spread-report-only

      - name: Package builds and installs into a fresh environment
        run: |
          .venv/bin/pip install -q build
          .venv/bin/python -m build --wheel
          python -m venv /tmp/fresh
          /tmp/fresh/bin/pip install -q dist/*.whl
          /tmp/fresh/bin/python -c "import verdictplane; print('import verdictplane: ok')"
          /tmp/fresh/bin/verdictplane verify
